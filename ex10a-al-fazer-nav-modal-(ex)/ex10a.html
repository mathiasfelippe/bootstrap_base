<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
</head>
<body>
    

    <!-- 1ª Digitação (Aqui) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Meu Site</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#exemploModal">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="modal fade" id="exemploModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <!-- header -->
                <div class="modal-header">
                    <h5 class="modal-title">Formulário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- body -->
                <div class="modal-body">
                    <p>
                        <form class="custom-form mt-3">
                            <div class="col-sm-12 mb-3">
                                <div class="input-group">
                                    <span class="input-group-text custom-icon">
                                        <i class="bi bi-envelope"></i>
                                    </span>
                                    <input type="email" class="form-control custom-input" placeholder="email">
                                </div>
                            </div>
                            <div class="col-sm-12 mb-3">
                                <div class="input-group">
                                    <span class="input-group-text custom-icon">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                    <input type="name" class="form-control custom-input" placeholder="nome">
                                </div>
                            </div>
                            <div class="col-sm-12 mb-3">
                                <label for="mensagemInput" class="form-label">Mensagem</label>
                                <textarea class="form-control" id="mensagemInput" rows="4" placeholder="Como podemos ajudar?" required></textarea>
                                <div class="invalid-feedback">
                                    Por favor, escreva uma mensagem.
                                </div>
                            </div>
                        </form>
                    </p>
                </div>

                <!-- Footer -->
                 <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button class="btn btn-primary custom-button">Enviar <i class="bi-arrow-right"></i></button>
                 </div>
            </div>
        </div>
    </div>


<script>
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
