<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Centralizar o carrossel */
        .carousel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .carousel-inner img {
            margin: auto;
            max-height: 400px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Minha Loja</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Início</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Ofertas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Contato</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- 🔹 Alerta Dinâmico -->
<div class="container mt-3">
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        Promoção de fantasias!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!--  Carrossel -->
<div class="carousel-container">
    <div id="carouselExample" class="carousel slide w-75" data-bs-ride="carousel">
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://images.tcdn.com.br/img/img_prod/841504/fantasia_infantil_caveira_completa_tamanho_p_257669_1_ca12d77efd0b349d2cda7904b5f9706f.jpg" class="d-block w-100" alt="Promo 1">
            </div>

            <div class="carousel-item">
                <img src="https://images.tcdn.com.br/img/img_prod/743485/fantasia_infantil_menino_menina_personagem_tematico_4443_1_dabe0714d8a7bf681649ce7f3b118185.jpg" class="d-block w-100" alt="Promo 2"> 
            </div>

            <div class="carousel-item">
                <img src="https://images.tcdn.com.br/img/img_prod/1236273/fantasia_infantil_flash_243_1_e179e9f77d01ab002961754ab44e8b69.jpg" class="d-block w-100" alt="Promo 3">
            </div>

        </div>

        <!-- Controles -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
</div>

<!--  Barra de Progresso -->
<div class="container mt-5 text-center">
    <h4>Venha desbloquear seu desconto   </h4>

    <div class="progress my-3">
        <div id="progress-bar" class="progress-bar bg-warning" role="progressbar" style="width: 0%">
            0%
        </div>
    </div>

    <button id="increase-progress" class="btn btn-primary">
        Avançar Progresso
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('increase-progress').addEventListener('click', function() {
        let progressBar = document.getElementById('progress-bar');
        let width = parseInt(progressBar.style.width) || 0;
        
        if (width < 100) {
            width += 20;
            progressBar.style.width = width + "%";
            progressBar.textContent = width + "%";

            if (width === 100) {
                alert("Parabéns! Você desbloqueou um desconto especial!");
            }
        }
    });
</script>

</body>
</html>
